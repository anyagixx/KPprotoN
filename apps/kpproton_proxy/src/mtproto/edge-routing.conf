# FILE: apps/kpproton_proxy/src/mtproto/edge-routing.conf
# VERSION: 1.0.0
# START_MODULE_CONTRACT
#   PURPOSE: Declare the foundational edge-routing contract for shared HTTPS and MTProto traffic on port 443.
#   SCOPE: Listener port, TLS file paths, SNI fallback behavior, and policy reload hook names.
#   DEPENDS: deploy/.env.example
#   LINKS: M-PROXY-BRIDGE, M-CERTS, M-DEPLOY
# END_MODULE_CONTRACT
#
# START_MODULE_MAP
#   listener.port - shared external listener
#   listener.tls_fullchain - mounted certificate chain path
#   listener.tls_privkey - mounted private key path
#   routing.https_fallback - Cowboy portal destination for normal HTTPS requests
#   routing.mtproto_policy_store - future domain-fronting policy source
# END_MODULE_MAP
#
# START_CHANGE_SUMMARY
#   LAST_CHANGE: v1.0.0 - Added shared 443 edge routing contract for future MTProto runtime integration.
# END_CHANGE_SUMMARY

# START_BLOCK_LISTENER
listener.port=443
listener.tls_fullchain=/certs/live/${BASE_DOMAIN}/fullchain.pem
listener.tls_privkey=/certs/live/${BASE_DOMAIN}/privkey.pem
# END_BLOCK_LISTENER

# START_BLOCK_ROUTING
routing.mode=shared-443
routing.https_fallback=127.0.0.1:8080
routing.mtproto_policy_store=/var/lib/kpproton/policies
routing.sni_reload_hook=apply_domain_policy
# END_BLOCK_ROUTING
